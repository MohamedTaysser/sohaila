<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحبك - I Love You</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Font Awesome for the WhatsApp icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for a romantic feel -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Custom styles for the romantic theme */
        body {
            /* A deep, romantic red gradient background */
            background: linear-gradient(135deg, #7f0000 0%, #d32f2f 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Font fallbacks: Cairo for Arabic, Playfair for English */
            font-family: 'Playfair Display', 'Cairo', serif;
            overflow: hidden; /* Prevent scrollbars from floating hearts */
        }

        /* Styling for the main quote container */
        #quote-container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px); /* Glassmorphism effect */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            width: 600px;
            transition: opacity 0.5s ease-in-out;
            z-index: 10; /* Ensure it stays above floating hearts */
        }

        /* Typography for the quotes */
        .quote-text {
            font-size: 2.5rem;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .constant-love {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffcccc;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Styling the WhatsApp button */
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #25D366; /* Official WhatsApp green */
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            font-family: 'Inter', sans-serif;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
        }

        /* Animation for floating hearts in the background */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.2);
            font-size: 2rem;
            animation: float 10s infinite linear;
            z-index: 1;
            pointer-events: none; /* Let clicks pass through to elements behind */
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.5;
            }
            80% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="relative">

    <!-- Container for dynamically generated floating hearts -->
    <div id="hearts-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>

    <main id="quote-container" class="flex flex-col items-center">
        <!-- The constant "I love you" message -->
        <div class="constant-love">بحبك - I Love You Always</div>
        
        <!-- The dynamic quote will be injected here -->
        <div id="dynamic-quote" class="quote-text" dir="auto">
            <!-- Loading text placeholder -->
            <i class="fas fa-heart fa-beat text-red-300"></i>
        </div>

        <!-- WhatsApp Button linking to the provided number -->
        <!-- URL encoded message: "Hello my love" -->
        <a href="https://wa.me/201207256335?text=بحبك" target="_blank" rel="noopener noreferrer" class="whatsapp-btn mt-6">
            <i class="fab fa-whatsapp text-2xl"></i>
            راسيلني - Message Me
        </a>
    </main>

    <script>
        // Array containing a mix of English romantic quotes and Egyptian Arabic dialect expressions
        const quotes = [
            // Egyptian Arabic
            "إنت دنيتي كلها.", // You are my whole world.
            "مفيش حد في قلبي غيرك.", // There is no one in my heart but you.
            "عنيا مش بتشوف غيرك.", // My eyes see no one else.
            "وحشتني أوي.", // I missed you so much.
            "إنت العوض الحلو اللي في حياتي.", // You are the beautiful compensation in my life.
            "بحبك قد النجوم.", // I love you as much as the stars.
            "يا روح قلبي من جوه.", // Oh, soul of my innermost heart.
            "إنت حتة مني.", // You are a piece of me.
            "روحي فيك.", // My soul is in you.
            "معاك بحس إن الدنيا لسه بخير.", // With you, I feel the world is still good.
            "يا نور عيني.", // Oh light of my eyes.
            "إنت النص الحلو اللي بيكملني.", // You are the sweet half that completes me.
            "ربنا يخليك ليا.", // May God keep you for me.
            "قلبي بيدق باسمك.", // My heart beats with your name.
            "أغلى حاجة في حياتي.", // The most precious thing in my life.
            
            // English
            "You are my today and all of my tomorrows.",
            "I fall in love with you more every single day.",
            "You are the best thing that's ever been mine.",
            "My heart is and always will be yours.",
            "I love you endlessly.",
            "You make my world a better place.",
            "To me, you are perfect.",
            "I look at you and see the rest of my life in front of my eyes.",
            "You are my soulmate.",
            "Thinking of you keeps me awake. Dreaming of you keeps me asleep. Being with you keeps me alive.",
            "I need you like a heart needs a beat.",
            "You stole my heart, but I'll let you keep it.",
            "I am so entirely yours.",
            "Loving you is the best decision I ever made.",
            "You are the reason I smile."
        ];

        /**
         * Function to pick a random quote from the array and display it.
         */
        function displayRandomQuote() {
            const quoteElement = document.getElementById('dynamic-quote');
            // Select a random index
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const selectedQuote = quotes[randomIndex];

            // Determine if the quote is Arabic to set text direction
            // A simple check: if the first character's char code is high, it's likely Arabic
            const isArabic = /[\u0600-\u06FF]/.test(selectedQuote);
            
            // Apply a fade-out/fade-in effect for smooth transitions
            quoteElement.style.opacity = 0;
            
            setTimeout(() => {
                quoteElement.innerText = selectedQuote;
                // Set text direction based on language
                quoteElement.setAttribute('dir', isArabic ? 'rtl' : 'ltr');
                // Apply specific font class based on language if needed
                if(isArabic) {
                    quoteElement.style.fontFamily = "'Cairo', sans-serif";
                } else {
                    quoteElement.style.fontFamily = "'Playfair Display', serif";
                }
                quoteElement.style.opacity = 1;
            }, 300); // Wait for fade out to complete
        }

        /**
         * Function to create floating background hearts.
         */
        function createHearts() {
            const container = document.getElementById('hearts-container');
            const heartCount = 20; // Number of hearts to float

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart heart';
                
                // Randomize starting position, size, and animation duration/delay
                const leftPos = Math.random() * 100; // 0 to 100vw
                const size = Math.random() * 2 + 1; // 1rem to 3rem
                const duration = Math.random() * 10 + 10; // 10s to 20s
                const delay = Math.random() * 10; // 0s to 10s

                heart.style.left = `${leftPos}vw`;
                heart.style.fontSize = `${size}rem`;
                heart.style.animationDuration = `${duration}s`;
                heart.style.animationDelay = `-${delay}s`; // Use negative delay to start mid-animation

                container.appendChild(heart);
            }
        }

        // Initialize when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            displayRandomQuote();
            createHearts();
        });
    </script>
</body>
</html>
